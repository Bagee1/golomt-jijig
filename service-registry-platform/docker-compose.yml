services:
  postgres:
    image: postgres:16-alpine
    container_name: service-registry-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-service_registry}
      POSTGRES_USER: ${POSTGRES_USER:-registry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-registry_user} -d ${POSTGRES_DB:-service_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  banking-postgres:
    image: postgres:16-alpine
    container_name: banking-transfer-postgres
    environment:
      POSTGRES_DB: ${BANKING_DB_NAME:-banking_transfer}
      POSTGRES_USER: ${BANKING_DB_USER:-banking_user}
      POSTGRES_PASSWORD: ${BANKING_DB_PASSWORD:-banking_password}
    ports:
      - "${BANKING_DB_PORT:-5433}:5432"
    volumes:
      - banking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BANKING_DB_USER:-banking_user} -d ${BANKING_DB_NAME:-banking_transfer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  deposit-postgres:
    image: postgres:16-alpine
    container_name: deposit-service-postgres
    environment:
      POSTGRES_DB: ${DEPOSIT_DB_NAME:-deposit_service}
      POSTGRES_USER: ${DEPOSIT_DB_USER:-deposit_user}
      POSTGRES_PASSWORD: ${DEPOSIT_DB_PASSWORD:-deposit_password}
    ports:
      - "${DEPOSIT_DB_PORT:-5434}:5432"
    volumes:
      - deposit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEPOSIT_DB_USER:-deposit_user} -d ${DEPOSIT_DB_NAME:-deposit_service}"]
      interval: 10s
      timeout: 5s
      retries: 5

  platform-api:
    build: ./backend/platform-api
    container_name: platform-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-service_registry}
      POSTGRES_USER: ${POSTGRES_USER:-registry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-dev-only-secret-at-least-32-characters}
    ports:
      - "${PLATFORM_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  banking-transfer-service:
    build: ./backend/banking-transfer-service
    container_name: banking-transfer-service
    environment:
      BANKING_DB_HOST: banking-postgres
      BANKING_DB_PORT: 5432
      BANKING_DB_NAME: ${BANKING_DB_NAME:-banking_transfer}
      BANKING_DB_USER: ${BANKING_DB_USER:-banking_user}
      BANKING_DB_PASSWORD: ${BANKING_DB_PASSWORD:-banking_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-dev-only-secret-at-least-32-characters}
    ports:
      - "8084:8084"
    depends_on:
      banking-postgres:
        condition: service_healthy

  deposit-service:
    build: ./backend/deposit-service
    container_name: deposit-service
    environment:
      DEPOSIT_DB_HOST: deposit-postgres
      DEPOSIT_DB_PORT: 5432
      DEPOSIT_DB_NAME: ${DEPOSIT_DB_NAME:-deposit_service}
      DEPOSIT_DB_USER: ${DEPOSIT_DB_USER:-deposit_user}
      DEPOSIT_DB_PASSWORD: ${DEPOSIT_DB_PASSWORD:-deposit_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-dev-only-secret-at-least-32-characters}
      BANKING_API_URL: http://banking-transfer-service:8084
      PLATFORM_API_URL: http://platform-api:8080
      SVC_DEPOSIT_USERNAME: ${SVC_DEPOSIT_USERNAME:-svc-deposit}
      SVC_DEPOSIT_PASSWORD: ${SVC_DEPOSIT_PASSWORD:-svc-deposit-demo-123}
    ports:
      - "8085:8085"
    depends_on:
      deposit-postgres:
        condition: service_healthy
      platform-api:
        condition: service_started
      banking-transfer-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: registry-frontend
    ports:
      - "5173:80"
    depends_on:
      - platform-api

  frontend-banking:
    build:
      context: ./frontend-banking
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_BANKING_API_URL: ${VITE_BANKING_API_URL:-http://localhost:8084}
        VITE_DEPOSIT_API_URL: ${VITE_DEPOSIT_API_URL:-http://localhost:8085}
    container_name: banking-frontend
    ports:
      - "5174:80"
    depends_on:
      - platform-api
      - banking-transfer-service
      - deposit-service

volumes:
  postgres_data:
  banking_postgres_data:
  deposit_postgres_data:

